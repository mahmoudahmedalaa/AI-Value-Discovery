services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-value-postgres
    environment:
      POSTGRES_DB: ai_value_discovery
      POSTGRES_USER: ai_value
      POSTGRES_PASSWORD: ai_value_local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_value -d ai_value_discovery"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: ai-value-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ai-value-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ai_value_minio
      MINIO_ROOT_PASSWORD: ai_value_minio_local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
